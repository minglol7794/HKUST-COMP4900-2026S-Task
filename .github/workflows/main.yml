# Workflow to validate student.json on pull requests and sync to Google Sheets

name: Validate Student and Sync to Spreadsheet

on:
  pull_request_target:
    branches: [ "master" ]

# Required to post comments on pull requests
permissions:
  pull-requests: write
  contents: read

jobs:
  check_json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      # ── Step 1: Validate student.json ────────────────────────────────────────
      - name: Validate student.json
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JSON_FILE="/tmp/student.json"
          PR_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          PR_SHA="${{ github.event.pull_request.head.sha }}"

          # Read student.json from the incoming PR head commit (not base branch)
          if ! gh api \
            "/repos/${PR_REPO}/contents/Data/student.json?ref=${PR_SHA}" \
            --jq '.content' | tr -d '\n' | base64 --decode > "$JSON_FILE"; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "\`Data/student.json\` is **missing** from this pull request."
              echo ""
              echo "Please add the file with the structure below and push again:"
              echo '```json'
              echo '{'
              echo '  "github-username": "your-github-username",'
              echo '  "hash-value": "<hex-digest>"'
              echo '}'
              echo '```'
            } > /tmp/pr_comment.md
            exit 0
          fi

          GITHUB_USERNAME=$(jq -r '."github-username" // empty' "$JSON_FILE")
          HASH_VALUE=$(jq -r '."hash-value" // empty' "$JSON_FILE")

          echo "github_username=$GITHUB_USERNAME" >> "$GITHUB_OUTPUT"
          echo "hash_value=$HASH_VALUE" >> "$GITHUB_OUTPUT"

          # Validate required fields are present.
          if [[ -z "$GITHUB_USERNAME" || -z "$HASH_VALUE" ]]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "Missing one or more required fields in \`Data/student.json\`."
              echo ""
              echo "Required fields: \`github-username\`, \`hash-value\`."
              echo ""
              echo "Please fix the value and push again."
            } > /tmp/pr_comment.md
            exit 0
          fi

          # Validate hash value format and expected digest length.
          if ! [[ "$HASH_VALUE" =~ ^[0-9a-fA-F]+$ ]]; then
            echo "::error::hash-value '$HASH_VALUE' is not a hex digest"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "**Invalid \`hash-value\`:** \`${HASH_VALUE}\`"
              echo ""
              echo "The \`hash-value\` field must be a hexadecimal digest."
              echo ""
              echo "Please fix the value and push again."
            } > /tmp/pr_comment.md
            exit 0
          fi

          DIGEST_LENGTH=${#HASH_VALUE}
          EXPECTED_LENGTH=64

          if [[ "$DIGEST_LENGTH" -ne "$EXPECTED_LENGTH" ]]; then
            echo "::error::hash-value length ($DIGEST_LENGTH) does not match sha256 ($EXPECTED_LENGTH)"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "**Invalid \`hash-value\` length:** \`${DIGEST_LENGTH}\`"
              echo ""
              echo "For \`sha256\`, the digest must be \`$EXPECTED_LENGTH\` hex characters."
              echo ""
              echo "Please rerun \`python3.13 Data/generate_hash.py\` and update \`Data/student.json\`."
            } > /tmp/pr_comment.md
            exit 0
          fi

          echo "valid=true" >> "$GITHUB_OUTPUT"
          echo "Validation passed: sha256 hash format"

      # ── Step 2: Post a comment when validation fails ──────────────────────────
      - name: Comment on PR (validation failed)
        if: steps.validate.outputs.valid != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr_comment.md

      - name: Comment on PR (validation passed)
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "✅ Your pull request is valid for the submission."

      # ── Step 3: Set up Python for the sync script ───────────────────────────
      - name: Set up Python
        if: steps.validate.outputs.valid == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: .github/requirements/sync-google-sheet.txt

      - name: Display Python version
        if: steps.validate.outputs.valid == 'true'
        run: python --version

      - name: Install Python dependencies
        if: steps.validate.outputs.valid == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements/sync-google-sheet.txt

      # ── Step 4: Sync to Google Sheets via Python script ─────────────────────
      - name: Sync to Google Spreadsheet
        id: sync_sheet
        if: steps.validate.outputs.valid == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GITHUB_USERNAME: ${{ steps.validate.outputs.github_username }}
          HASH_VALUE: ${{ steps.validate.outputs.hash_value }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python .github/scripts/sync_google_sheet.py

      - name: Comment on PR (sync completed)
        if: steps.validate.outputs.valid == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "✅ Your submission has been synced to the Google Spreadsheet.
                    🎗️ Remember to submit the PR link to Canvas"

